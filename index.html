<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AronrashudHub | Billy Edition</title>
    <style>
        :root {
            --primary: #FFD700;
            --bg: #000000;
            --card: #1a1a1a;
            --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: 'Arial', sans-serif; width: 100%; height: 100%; overflow: hidden;
        }

        /* 1. ЗАГРУЗКА */
        #network-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000;
        }

        .spinner {
            width: 60px; height: 60px;
            border: 4px solid #222;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 2. ПРОВЕРКА 18+ */
        #age-verification {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; padding: 20px;
        }

        .hub-logo { font-size: 3rem; font-weight: 900; margin-bottom: 20px; }
        .hub-logo span { background: var(--primary); color: #000; padding: 0 10px; border-radius: 5px; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 320px; }
        .btn { padding: 20px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; }
        .btn-confirm { background: var(--primary); color: #000; font-size: 1.1rem; }
        .btn-exit { background: #333; color: #fff; }

        /* 3. КОНТЕНТ */
        #main-site { display: none; height: 100%; overflow-y: auto; }
        
        .header { 
            padding: 15px 20px; background: #111; border-bottom: 2px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 50;
        }

        .container { padding: 15px; max-width: 1200px; margin: 0 auto; }

        .video-card { 
            background: var(--card); border-radius: 12px; overflow: hidden; 
            margin-bottom: 20px; border: 1px solid #333;
        }

        /* Стили для самого видеоплеера */
        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .video-info { padding: 15px; }
        .video-info h3 { margin: 0 0 5px 0; color: var(--primary); font-size: 1.2rem; }
        .video-info p { margin: 0; font-size: 0.9rem; color: #bbb; }

        .fade-out { opacity: 0; transition: opacity 0.5s ease; }
    </style>
</head>
<body>

    <div id="network-loader">
        <div class="spinner"></div>
        <div style="color: var(--primary); font-family: monospace;" id="status-text">ESTABLISHING CONNECTION...</div>
    </div>

    <div id="age-verification">
        <div class="hub-logo">ARONRASHUD<span>HUB</span></div>
        <h2 style="text-align: center; margin-bottom: 40px;">ТЕБЕ ЕСТЬ 18 ЛЕТ?</h2>
        <div class="btn-group">
            <button class="btn btn-confirm" onclick="allow()">ДА, Я ВЗРОСЛЫЙ</button>
            <button class="btn btn-exit" onclick="deny()">НЕТ, Я УХОЖУ</button>
        </div>
    </div>

    <div id="main-site">
        <header class="header">
            <div class="hub-logo" style="font-size: 1.5rem; margin: 0;">ARONRASHUD<span>HUB</span></div>
            <div style="font-weight: bold; color: var(--primary);">MOBILE VERSION</div>
        </header>

        <div class="container">
            <h2 style="border-left: 4px solid var(--primary); padding-left: 10px;">Рекомендовано для тебя</h2>
            
            <div class="video-card">
                <video controls poster="https://via.placeholder.com/800x450/1a1a1a/FFD700?text=Billy+Harrington">
                    <source src="b.mp4" type="video/mp4">
                    Ваш браузер не поддерживает видео.
                </video>
                <div class="video-info">
                    <h3>Billy Harrington is legend</h3>
                    <p>10.5M просмотров • 100% Satisfaction</p>
                </div>
            </div>

            <div class="video-card">
                <div style="width:100%; aspect-ratio:16/9; background:#222; display:flex; align-items:center; justify-content:center; color:#444;">NEXT VIDEO</div>
                <div class="video-info">
                    <h3>Upcoming Gachi Content</h3>
                    <p>250K просмотров • 98% Likes</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loader = document.getElementById('network-loader');
        const ageGate = document.getElementById('age-verification');
        const mainSite = document.getElementById('main-site');

        // Логика загрузки 3 секунды
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('isVerified') === 'true') {
                loader.style.display = 'none';
                showSite();
                return;
            }

            setTimeout(() => {
                document.getElementById('status-text').innerText = "ENCRYPTING DATA...";
            }, 1500);

            setTimeout(() => {
                loader.classList.add('fade-out');
                setTimeout(() => {
                    loader.style.display = 'none';
                    ageGate.style.display = 'flex';
                }, 500);
            }, 3000);
        });

        function allow() {
            localStorage.setItem('isVerified', 'true');
            ageGate.classList.add('fade-out');
            setTimeout(() => {
                ageGate.style.display = 'none';
                showSite();
            }, 500);
        }

        function showSite() {
            mainSite.style.display = 'block';
            document.body.style.overflow = 'auto';
        }

        function deny() {
            window.location.href = "https://www.google.com";
        }
    </script>
</body>
</html>
