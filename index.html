<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AronrashudHub | Secure Access</title>
    <style>
        :root {
            --primary: #FFD700;
            --bg: #000000;
            --card: #121212;
            --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: sans-serif; width: 100%; height: 100%; overflow: hidden;
        }

        /* 1. ЭКРАН ПОДКЛЮЧЕНИЯ (3 СЕКУНДЫ) */
        #network-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 3px solid #222;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loader-text {
            color: var(--primary);
            font-family: monospace;
            letter-spacing: 2px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* 2. ЭКРАН ПРОВЕРКИ 18 ЛЕТ */
        #age-verification {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; /* Скрыт по умолчанию */
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; padding: 20px; text-align: center;
        }

        .hub-logo { font-size: 3rem; font-weight: 900; margin-bottom: 15px; }
        .hub-logo span { background: var(--primary); color: #000; padding: 0 8px; border-radius: 5px; }

        .buttons-row { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        .btn { 
            padding: 18px; font-weight: 800; border: none; border-radius: 8px; 
            cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn-confirm { background: var(--primary); color: #000; }
        .btn-exit { background: #222; color: #fff; }

        /* 3. КОНТЕНТ САЙТА */
        #main-site { display: none; height: 100%; overflow-y: auto; }
        .header { padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .content-grid { display: grid; grid-template-columns: 1fr; gap: 10px; padding: 15px; }
        .video-card { background: var(--card); border-radius: 8px; overflow: hidden; }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #222; display: flex; align-items: center; justify-content: center; }
        .info { padding: 10px; }

        @media (min-width: 768px) {
            .content-grid { grid-template-columns: repeat(3, 1fr); }
            .buttons-row { flex-direction: row; max-width: 450px; }
        }

        .fade-out { opacity: 0; transition: opacity 0.5s ease; }
    </style>
</head>
<body>

    <div id="network-loader">
        <div class="spinner"></div>
        <div class="loader-text" id="status-text">Connecting to Secure Network...</div>
    </div>

    <div id="age-verification">
        <div class="hub-logo">ARONRASHUD<span>HUB</span></div>
        <h2 style="margin-bottom: 30px;">ВАМ ЕСТЬ 18 ЛЕТ?</h2>
        <div class="buttons-row">
            <button class="btn btn-confirm" onclick="confirmAge()">ДА, МНЕ ЕСТЬ 18</button>
            <button class="btn btn-exit" onclick="exitSite()">НЕТ, ВЫЙТИ</button>
        </div>
    </div>

    <div id="main-site">
        <header class="header">
            <div class="hub-logo" style="font-size: 1.2rem; margin: 0;">ARONRASHUD<span>HUB</span></div>
            <div style="color: var(--primary)">LIVE ●</div>
        </header>
        <div class="content-grid">
            <div class="video-card">
                <div class="thumb">VIDEO PREVIEW</div>
                <div class="info"><b>Private Stream #1</b><br><small>2.4M Views</small></div>
            </div>
            <div class="video-card">
                <div class="thumb">VIDEO PREVIEW</div>
                <div class="info"><b>Top Rated Content</b><br><small>1.1M Views</small></div>
            </div>
            <div class="video-card">
                <div class="thumb">VIDEO PREVIEW</div>
                <div class="info"><b>New Release</b><br><small>800K Views</small></div>
            </div>
        </div>
    </div>

    <script>
        const loader = document.getElementById('network-loader');
        const ageGate = document.getElementById('age-verification');
        const mainSite = document.getElementById('main-site');
        const statusText = document.getElementById('status-text');

        // 1. Логика загрузки 3 секунды
        window.addEventListener('load', () => {
            // Если уже подтверждали ранее, пропускаем всё
            if (localStorage.getItem('isAdult') === 'true') {
                loader.style.display = 'none';
                mainSite.style.display = 'block';
                document.body.style.overflow = 'auto';
                return;
            }

            // Имитация этапов подключения
            setTimeout(() => { statusText.innerText = "Securing Tunnel..."; }, 1000);
            setTimeout(() => { statusText.innerText = "Finalizing..."; }, 2000);

            // Через 3 секунды убираем лоадер и показываем проверку 18+
            setTimeout(() => {
                loader.classList.add('fade-out');
                setTimeout(() => {
                    loader.style.display = 'none';
                    ageGate.style.display = 'flex';
                }, 500);
            }, 3000);
        });

        // 2. Логика кнопок возраста
        function confirmAge() {
            localStorage.setItem('isAdult', 'true');
            ageGate.classList.add('fade-out');
            setTimeout(() => {
                ageGate.style.display = 'none';
                mainSite.style.display = 'block';
                document.body.style.overflow = 'auto';
            }, 500);
        }

        function exitSite() {
            window.location.href = "https://www.google.com";
        }
    </script>
</body>
</html>
