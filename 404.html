<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AronrashudHub</title>
    <style>
        :root {
            --primary: #FFD700;
            --bg: #000000;
            --card: #121212;
            --text: #ffffff;
            --gray: #888888;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            width: 100%; height: 100%;
        }

        .no-scroll { overflow: hidden; }
        .hidden { display: none !important; }

        /* ЛОГОТИП */
        .hub-logo {
            font-size: clamp(1.5rem, 8vw, 2.5rem);
            font-weight: 900;
            letter-spacing: -1px;
            cursor: pointer;
        }
        .hub-logo span {
            background-color: var(--primary);
            color: #000;
            padding: 0 6px;
            border-radius: 4px;
            margin-left: 2px;
        }

        /* 1. ПРОВЕРКА ВОЗРАСТА */
        #age-verification {
            position: fixed; inset: 0;
            background: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10000; padding: 20px; text-align: center;
        }

        /* 2. СТРАНИЦА 404 */
        #error-404 {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 80vh; text-align: center; padding: 20px;
        }
        .error-code {
            font-size: 8rem; font-weight: 900;
            color: var(--primary); line-height: 1; margin: 0;
        }
        .error-msg { font-size: 1.2rem; margin-bottom: 30px; color: var(--gray); }

        /* КНОПКИ */
        .btn {
            width: 100%; max-width: 300px;
            padding: 18px; font-size: 1.1rem; font-weight: 800;
            border: none; border-radius: 12px;
            cursor: pointer; text-transform: uppercase; margin: 5px;
        }
        .btn-confirm { background-color: var(--primary); color: #000; }
        .btn-exit { background-color: #222; color: #fff; }

        /* КОНТЕНТ */
        header {
            position: sticky; top: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(0,0,0,0.95);
            border-bottom: 1px solid #222; z-index: 100;
        }

        .content-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr));
            gap: 15px; padding: 15px;
        }

        @media (min-width: 768px) {
            .content-grid { grid-template-columns: repeat(3, 1fr); padding: 30px; }
            .btn { width: auto; min-width: 200px; }
        }

        .video-card { background: var(--card); border-radius: 8px; overflow: hidden; }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #222; position: relative; }
        .thumb::before { content: '▶'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; opacity: 0.5; }
        .meta { padding: 12px; }
        .meta h3 { margin: 0; font-size: 1rem; }
    </style>
</head>
<body class="no-scroll">

    <div id="age-verification">
        <div class="hub-logo" style="margin-bottom: 20px;">ARONRASHUD<span>HUB</span></div>
        <h2 style="margin-bottom: 30px;">ВАМ ЕСТЬ 18 ЛЕТ?</h2>
        <button class="btn btn-confirm" onclick="verify(true)">МНЕ ЕСТЬ 18</button>
        <button class="btn btn-exit" onclick="verify(false)">МНЕ НЕТ 18</button>
    </div>

    <div id="main-site" class="hidden">
        <header>
            <div class="hub-logo" onclick="showPage('home')">ARONRASHUD<span>HUB</span></div>
            <div style="color: var(--primary); cursor: pointer;" onclick="showPage('404')">🔎 Поиск</div>
        </header>

        <div id="page-home">
            <div style="padding: 20px 20px 5px 20px;"><h2>🔥 Свежее видео</h2></div>
            <main class="content-grid">
                <div class="video-card"><div class="thumb"></div><div class="meta"><h3>Video Title 1</h3></div></div>
                <div class="video-card"><div class="thumb"></div><div class="meta"><h3>Video Title 2</h3></div></div>
                <div class="video-card"><div class="thumb"></div><div class="meta"><h3>Video Title 3</h3></div></div>
            </main>
        </div>

        <div id="page-404" class="hidden">
            <div id="error-404">
                <p class="error-code">404</p>
                <p class="error-msg">Упс! Кажется, эта страница ушла в приватный режим.</p>
                <button class="btn btn-confirm" onclick="showPage('home')">На главную</button>
            </div>
        </div>
    </div>

    <script>
        const ageGate = document.getElementById('age-verification');
        const mainSite = document.getElementById('main-site');

        // Логика проверки возраста
        function verify(isAdult) {
            if (isAdult) {
                ageGate.style.display = 'none';
                mainSite.classList.remove('hidden');
                document.body.classList.remove('no-scroll');
                localStorage.setItem('hub_access', 'granted');
            } else {
                window.location.href = "https://www.google.com";
            }
        }

        // Переключение страниц (имитация)
        function showPage(pageId) {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-404').classList.add('hidden');
            
            if (pageId === 'home') {
                document.getElementById('page-home').classList.remove('hidden');
            } else {
                document.getElementById('page-404').classList.remove('hidden');
            }
            window.scrollTo(0,0);
        }

        // Проверка при входе
        window.onload = () => {
            if (localStorage.getItem('hub_access') === 'granted') {
                verify(true);
            }
        }
    </script>
</body>
</html>
